version: "3.8"

# MultiversX XDP Squad — Host Network Mode
#
# Host networking gives AF_XDP direct access to the real NIC for
# native/zero-copy mode. Each node uses a different REST API port
# since they share the host network namespace.
#
# XDP requires: NET_RAW, NET_ADMIN, SYS_ADMIN (CAP_BPF), IPC_LOCK (UMEM mlock)

x-node-common: &node-common
  build:
    context: .
    dockerfile: docker/Dockerfile
    args:
      GITHUB_ORG: ${GITHUB_ORG:-mihaieremia}
  restart: unless-stopped
  network_mode: host
  cap_add:
    - NET_RAW
    - NET_ADMIN
    - SYS_ADMIN
    - IPC_LOCK
  ulimits:
    memlock:
      soft: -1
      hard: -1
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:${REST_PORT:-8080}/node/status"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 120s

services:
  observer-shard-0:
    <<: *node-common
    container_name: mvx-xdp-observer-shard-0
    environment:
      - REST_PORT=8080
    volumes:
      - xdp-shard-0-db:/go/mx-chain-go/cmd/node/db
      - xdp-shard-0-logs:/go/mx-chain-go/cmd/node/logs
    command:
      - --working-directory=/go/mx-chain-go/cmd/node
      - --start-in-epoch=true
      - --destination-shard-as-observer=0
      - --rest-api-interface=:8080
      - --log-level=*:INFO,p2p:DEBUG
      - --log-save
      - --log-logger-name
      - --log-correlation
      - --display-name=XDP-Observer-Shard-0

  observer-shard-1:
    <<: *node-common
    container_name: mvx-xdp-observer-shard-1
    environment:
      - REST_PORT=8081
    volumes:
      - xdp-shard-1-db:/go/mx-chain-go/cmd/node/db
      - xdp-shard-1-logs:/go/mx-chain-go/cmd/node/logs
    command:
      - --working-directory=/go/mx-chain-go/cmd/node
      - --start-in-epoch=true
      - --destination-shard-as-observer=1
      - --rest-api-interface=:8081
      - --log-level=*:INFO,p2p:DEBUG
      - --log-save
      - --log-logger-name
      - --log-correlation
      - --display-name=XDP-Observer-Shard-1

  observer-shard-2:
    <<: *node-common
    container_name: mvx-xdp-observer-shard-2
    environment:
      - REST_PORT=8082
    volumes:
      - xdp-shard-2-db:/go/mx-chain-go/cmd/node/db
      - xdp-shard-2-logs:/go/mx-chain-go/cmd/node/logs
    command:
      - --working-directory=/go/mx-chain-go/cmd/node
      - --start-in-epoch=true
      - --destination-shard-as-observer=2
      - --rest-api-interface=:8082
      - --log-level=*:INFO,p2p:DEBUG
      - --log-save
      - --log-logger-name
      - --log-correlation
      - --display-name=XDP-Observer-Shard-2

  observer-metachain:
    <<: *node-common
    container_name: mvx-xdp-observer-metachain
    environment:
      - REST_PORT=8083
    volumes:
      - xdp-metachain-db:/go/mx-chain-go/cmd/node/db
      - xdp-metachain-logs:/go/mx-chain-go/cmd/node/logs
    command:
      - --working-directory=/go/mx-chain-go/cmd/node
      - --start-in-epoch=true
      - --destination-shard-as-observer=metachain
      - --rest-api-interface=:8083
      - --log-level=*:INFO,p2p:DEBUG
      - --log-save
      - --log-logger-name
      - --log-correlation
      - --display-name=XDP-Observer-Metachain

volumes:
  xdp-shard-0-db:
  xdp-shard-0-logs:
  xdp-shard-1-db:
  xdp-shard-1-logs:
  xdp-shard-2-db:
  xdp-shard-2-logs:
  xdp-metachain-db:
  xdp-metachain-logs:
